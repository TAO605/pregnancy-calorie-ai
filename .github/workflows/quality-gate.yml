name: Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: Unit, Integration, E2E, Visual
    runs-on: ubuntu-latest
    env:
      CI: true
      DEEPL_AUTH_KEY: ${{ secrets.DEEPL_AUTH_KEY }}
      PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Cypress binary
        run: npx cypress install

      - name: Run quality gate
        run: npm run quality:gate

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-reports
          path: |
            .qa/reports
            .qa/reports/cypress-console
            cypress/screenshots
            cypress/videos
            public/locales/deepl-api-call-log.json

      - name: Comment quality report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.qa/reports/quality-gate-report.md';
            const fallback = [
              '# Quality Gate Report',
              '',
              'The quality gate did not produce a Markdown report. Check the workflow logs and uploaded artifacts.',
            ].join('\n');
            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : fallback;
            const marker = '<!-- multilingual-quality-gate-report -->';
            const body = `${marker}\n${report.slice(0, 60000)}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find((comment) => comment.body && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
