<!DOCTYPE html>
<html lang="en" data-all-features-free="true">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | AI Pregnancy Calorie Calculator</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    :root {
      --primary: #9c2760;
      --primary-strong: #7f1d4c;
      --surface: #ffffff;
      --surface-soft: #fff8fb;
      --text: #241b21;
      --muted: #756772;
      --line: #efdde5;
      --focus: rgba(156, 39, 96, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fffbfd 0%, #fff6fa 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    .reset-shell {
      width: min(100%, 430px);
      text-align: center;
    }

    .reset-logo {
      width: min(260px, 72vw);
      height: auto;
      margin: 0 auto 22px;
      display: block;
    }

    .reset-card {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: var(--surface);
      box-shadow: 0 24px 70px rgba(47, 41, 45, 0.12);
      padding: 24px 18px 18px;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .reset-note {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
    }

    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: center;
    }

    .reset-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }

    .reset-field label {
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
    }

    .reset-input {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      color: var(--text);
      padding: 0 16px;
      font-size: 16px;
      font-weight: 650;
      outline: none;
    }

    .reset-input:focus {
      border-color: var(--primary);
      background: var(--surface-soft);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .primary-button,
    .secondary-button {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 900;
      transition: transform 180ms ease, opacity 180ms ease;
    }

    .primary-button {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .secondary-button {
      background: var(--surface);
      color: var(--text);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .reset-status {
      min-height: 22px;
      color: var(--primary-strong);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      text-align: center;
    }

    .hidden { display: none !important; }
  </style>
<style id="all-features-free-guard">
html[data-all-features-free="true"] .subscription-teaser,
html[data-all-features-free="true"] .premium-result-card,
html[data-all-features-free="true"] .premium-account-badge,
html[data-all-features-free="true"] .premium-upgrade-button,
html[data-all-features-free="true"] .premium-manage-button,
html[data-all-features-free="true"] .plan-card,
html[data-all-features-free="true"] .pricing-grid,
html[data-all-features-free="true"] .pricing-currency-row,
html[data-all-features-free="true"] .guarantee,
html[data-all-features-free="true"] .guarantee-note,
html[data-all-features-free="true"] [data-usd-charge-note],
html[data-all-features-free="true"] [data-checkout-plan],
html[data-all-features-free="true"] a[href*="/pricing"],
html[data-all-features-free="true"] a[href*="pricing.html"],
html[data-all-features-free="true"] a[href*="/premium"],
html[data-all-features-free="true"] a[href*="premium.html"],
html[data-all-features-free="true"] a[href*="/refund-policy"],
html[data-all-features-free="true"] a[href*="refund-policy.html"] {
  display: none !important;
}
</style>
<script id="all-features-free-paid-copy-guard">
(function(){
  if (document.documentElement.dataset.allFeaturesFree !== "true") return;
  function prunePaidCopy(){
    var paidPattern = /\b(Pricing|Premium|Subscribe|subscription|checkout|Unlock|Upgrade|Buy Now|Start Free Trial|Stripe|billing|payment|paid|price|prices|refund|money-back|charged in USD)\b|\$7\.99|\$79\.99|\b(Precios?|suscripci[oó]n|facturaci[oó]n|pago|reembolso)\b|\b(Prix|abonnement|facturation|paiement|remboursement)\b|\b(Preis|Preise|Abonnement|Zahlung|R[üu]ckerstattung|Erstattung)\b|\b(Pre[cç]os?|assinatura|faturamento|pagamento|reembolso)\b|\b(Prezzi?|abbonamento|fatturazione|pagamento|rimborso)\b|подпис|оплат|плат[её]ж|возврат|премиум|цены|الأسعار|الاشتراك|الدفع|الفواتير|استرداد|返金|価格|料金|支払い|サブスクリプション|プレミアム|환불|가격|요금|결제|구독|프리미엄/i;
    var selectors = [
      "p",
      "li",
      "a",
      "button",
      "h2",
      "h3",
      "small",
      ".currency-note",
      ".support-card",
      ".guarantee",
      ".guarantee-note",
      ".premium-result-card",
      ".subscription-teaser",
      ".premium-account-badge",
      ".premium-upgrade-button",
      ".premium-manage-button"
    ].join(",");
    document.querySelectorAll(selectors).forEach(function(element){
      var text = (element.innerText || element.textContent || "").trim();
      if (text && paidPattern.test(text)) element.hidden = true;
    });
    document.querySelectorAll("input[placeholder], textarea[placeholder]").forEach(function(element){
      var placeholder = element.getAttribute("placeholder") || "";
      if (!paidPattern.test(placeholder)) return;
      element.setAttribute("placeholder", placeholder.replace(/\bBilling,?\s*/i, "").replace(/\bsubscription,?\s*/i, "").replace(/\bpayment,?\s*/i, "").replace(/\s{2,}/g, " ").replace(/^,\s*/, "").trim());
    });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", prunePaidCopy, { once: true });
  else prunePaidCopy();
}());
</script>
</head>
<body>
  <main class="reset-shell">
    <img class="reset-logo" src="logo-horizontal.png" alt="AI Pregnancy Calorie Calculator">
    <section class="reset-card" aria-labelledby="resetTitle">
      <h1 id="resetTitle">Reset your password</h1>
      <p id="tokenStatus" class="reset-note">Checking your reset link...</p>
      <form id="resetForm" class="reset-form hidden" novalidate>
        <div class="reset-field">
          <label for="newPasswordInput">New Password</label>
          <input id="newPasswordInput" class="reset-input" type="password" autocomplete="new-password" minlength="6" placeholder="At least 6 characters">
        </div>
        <div class="reset-field">
          <label for="confirmPasswordInput">Confirm Password</label>
          <input id="confirmPasswordInput" class="reset-input" type="password" autocomplete="new-password" minlength="6" placeholder="Re-enter your new password">
        </div>
        <p id="resetErrorText" class="reset-status" aria-live="polite"></p>
        <button id="resetSubmitButton" class="primary-button" type="submit">Reset Password</button>
      </form>
      <div id="expiredActions" class="reset-form hidden">
        <p class="reset-status">This reset link is invalid or expired. Please request a new reset link.</p>
        <a class="secondary-button" href="index.html?auth=reset" style="display:grid;place-items:center;text-decoration:none;">Resend Reset Link</a>
      </div>
    </section>
  </main>

  <script>
    // 中文注释：密码重置落地页接口配置位置。接口路径与Vercel Serverless Functions保持一致。
    const token = new URLSearchParams(window.location.search).get("token") || "";
    const tokenStatus = document.getElementById("tokenStatus");
    const resetForm = document.getElementById("resetForm");
    const expiredActions = document.getElementById("expiredActions");
    const resetErrorText = document.getElementById("resetErrorText");
    const resetSubmitButton = document.getElementById("resetSubmitButton");
    const newPasswordInput = document.getElementById("newPasswordInput");
    const confirmPasswordInput = document.getElementById("confirmPasswordInput");

    function showExpired(message) {
      tokenStatus.textContent = message || "This reset link is invalid or expired.";
      resetForm.classList.add("hidden");
      expiredActions.classList.remove("hidden");
    }

    function isValidPassword(value) {
      return typeof value === "string" && value.length >= 6;
    }

    async function requestJson(endpoint, payload) {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify(payload || {})
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.ok === false) throw new Error(data.error || "Request failed.");
      return data;
    }

    async function verifyToken() {
      if (!token) {
        showExpired("Reset link is missing.");
        return;
      }
      try {
        const data = await requestJson("/api/auth/verify-reset-token", { token });
        tokenStatus.textContent = "Enter a new password for " + data.email + ".";
        resetForm.classList.remove("hidden");
        newPasswordInput.focus({ preventScroll: true });
      } catch (error) {
        showExpired(error.message);
      }
    }

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      if (!isValidPassword(newPassword)) {
        resetErrorText.textContent = "Password must be at least 6 characters.";
        return;
      }
      if (newPassword !== confirmPassword) {
        resetErrorText.textContent = "Passwords do not match.";
        return;
      }
      resetSubmitButton.disabled = true;
      resetSubmitButton.textContent = "Resetting...";
      resetErrorText.textContent = "";
      try {
        const data = await requestJson("/api/auth/confirm-reset-password", { token, newPassword });
        tokenStatus.textContent = data.message || "Your password has been reset. Please log in with your new password.";
        resetForm.classList.add("hidden");
        window.setTimeout(() => {
          window.location.href = "index.html?auth=login";
        }, 1800);
      } catch (error) {
        resetErrorText.textContent = error.message || "Password reset failed.";
        resetSubmitButton.disabled = false;
        resetSubmitButton.textContent = "Reset Password";
      }
    });

    verifyToken();
  </script>
</body>
</html>
